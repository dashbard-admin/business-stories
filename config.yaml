# Business & Brand Origin Stories Pipeline — Operator Configuration
# Edit this file. All modules read from it via pipeline/config.py.

channel:
  name: "Origin & Outcome"
  brand_color: "#1a2b3c"
  channel_id: ""                   # fill after YouTube channel creation
  contact_email: "you@example.com"

paths:
  # `paths.root` is OPTIONAL. By default the project root is derived
  # from the directory containing config.yaml on disk, so this file
  # is portable across machines and checkout locations. Set
  # `root: "/absolute/path"` only if you want the workspace (state,
  # episodes, assets) hosted on a different drive than the code; if
  # the path you set doesn't exist, the loader silently falls back
  # to the config-file's directory.
  #
  # root: "/Users/example/business_success_stories"
  state: "${root}/state"
  episodes: "${root}/episodes"
  assets: "${root}/assets"
  logs: "${root}/logs"
  prompts: "${root}/pipeline/prompts"
  style_profiles: "${root}/pipeline/style_profiles"

models:
  # Each name is a logical key passed to the LLM gateway at
  # http://10.0.4.250:9000/v1 (Bearer token "pass123"). The gateway
  # selects the loaded MLX model that matches.
  llm_writer: "Qwen3.6-35B-A3B-UD-MLX-4bit"
  llm_critic: "gemma-4-26B-A4B-it-MLX-8bit"
  llm_extractor: "Qwen3.6-35B-A3B-UD-MLX-4bit"
  tts: "mlx-community/Kokoro-82M-bf16"
  vlm: "Qwen3-VL-4B-Instruct-MLX-8bit"

  # When true, all model calls return deterministic synthetic output
  # so the pipeline can be exercised end-to-end without GPU time.
  mock_mode: false

production:
  target_episodes_per_week: 2
  target_duration_seconds: 1100     # 18.3 min midpoint (15-22 min target)
                                    # (bumped 2026-05-26 — Batch A. YouTube
                                    # algo since mid-2024 rewards longer
                                    # videos: more mid-roll ad slots and
                                    # stronger session-watch-time signal.
                                    # Modern MBA / Business Casual / Cold
                                    # Fusion all pivoted to 18-25 min in
                                    # 2024-25.)
  duration_tolerance_seconds: 210   # +/- 3.5 min around the 18.3-min mid
  target_words: 2300                # 120wpm × 18 min ≈ 2160 spoken words;
                                    # +160 buffer for SFX/music pauses.
  word_count_tolerance: 250
  wpm_effective: 120                # Anchored to script_generate.txt
                                    # which schedules Act 0-5 hook
                                    # cadence at 120 wpm. Changing this
                                    # invalidates the hook timing the
                                    # writer prompt is calibrated for.

  # Opening title card (prepended before Act 0). The script_generate
  # prompt is explicit: NO INTRO, NO LOGO, NO "WELCOME BACK". Default
  # is 0 (disabled) so the first frame is Act 0's cold open. Set to
  # 2-8 if you want a brand stamp at the cost of the cold-open 15s
  # retention window.
  opening_title_card_seconds: 5

  # Closing source-attribution card (appended after Act 5). Default 5
  # seconds — enough for the operator's source citations to read,
  # short enough not to compete with Act 5's editorial closing.
  # Set to 0 to disable entirely.
  closing_card_seconds: 5

  # Per-clip fade in / fade out. Applied to EVERY clip in S12 (title,
  # every beat, closing). Each beat's clip plays: black -> image
  # (over fade_in_seconds) -> hold -> image -> black (over
  # fade_out_seconds). Between two beats you see beat-N fade out
  # then beat-N+1 fade in, giving the classic documentary
  # punctuated-cut feel. 0.2-0.4 each is subtle but visible; 0
  # disables the fade entirely on whichever side. Each fade is
  # internally clamped to max 40% of the clip's duration so short
  # beats stay coherent.
  fade_in_seconds: 0.5
  fade_out_seconds: 0.5

  # ----- Title-card styling (YouTube-thumbnail look) -----
  # When opening_title_card_seconds > 0, S12 composites the episode
  # title in a bold high-contrast font over the FLUX-rendered
  # title.png backdrop. Yellow body + black outline stroke, no
  # background band — the stroke alone carries legibility against
  # any backdrop.
  title_card_text_color: "#FFE600"        # bright yellow
  title_card_stroke_color: "#000000"      # black outline
  title_card_stroke_width: 8              # px outline thickness
  title_card_font_size_pct: 0.13          # frac of frame height: 0.13 * 1080 = 140px
  title_card_padding_pct: 0.06            # frac of frame height: 65px edge padding
  title_card_corner: "random"             # "random" | "top-left" |
                                          # "top-right" | "bottom-left" |
                                          # "bottom-right". When random,
                                          # the corner is deterministic
                                          # per episode (seeded by id),
                                          # so re-runs are reproducible.
  title_card_uppercase: true              # SCREAM CASE for the title text
  title_card_show_year: false             # set true to add a small year
                                          # tag in the opposite corner

quality_gates:
  min_verified_facts: 5
  min_pd_assets: 3
  # Beat-count window — bumped 2026-05-26 (Batch A) to match the
  # 18-min target length. The 7-act template distributes beats as:
  # Act 0 1-2 / Act 1 12 / Act 2 11 / Act 3 16 / Act 3.5 9 /
  # Act 4 12 / Act 5 5-6 → ~70 mid, up to ~95 for longer scripts.
  min_total_beats: 65
  max_total_beats: 95
  min_sources: 8
  max_sources: 50                  # hard cap for S2 inventory size
  min_tier1_sources: 1              # ≥1 primary-source filing / Wikipedia anchor
  # Script-word window — bumped 2026-05-26 (Batch A) for 18-min target.
  # 120wpm × 18min ≈ 2160 spoken; we widen to 1900-2700 to allow
  # natural variance across narrators and story_kinds.
  min_script_words: 2000 
  max_script_words: 3000
  audio_lufs_target: -14
  audio_lufs_min: -15
  audio_lufs_max: -13
  audio_peak_max_dbtp: -1.0

constraints:
  # Cooldowns on assignment dimensions across recent episodes.
  rolling_window_archetype: 3
  rolling_window_narrator: 3
  rolling_window_visual_style: 2

orchestrator:
  stale_lock_hours: 6
  max_topic_discovery_retries: 5
  per_invocation_max_runtime_seconds: 5400   # 90 min cap per cron run

  # In-flight gate after S08 (Batch B 2026-05-26). When true, S08
  # completes the beat-sheet write to disk then marks the stage
  # `needs_human` with a summary table. Operator reviews
  # 02_script/beat_sheet.json (and the beat distribution by
  # visual_intent) and runs:
  #   python -m pipeline.hermes_orchestrator --approve <ep_id>
  # to clear the gate and advance to S09. Useful for the first few
  # episodes to build operator intuition for the beat-distribution
  # quality; flip back to false once trust is established (the
  # auto-pilot is the value).
  gate_at_S08: false

visual_brand_safety:
  # Post-S09 VLM pass (Batch F 2026-05-28). For every rendered beat,
  # the VLM is asked whether the panel is brand-safe and topic-
  # coherent for the company / era / story_kind. Catches the things
  # the per-image critique misses:
  #   - hacking-coded panels in non-crime stories (the Pets.com
  #     review video had a "REDIRECTING..." panel with a noir figure
  #     that read as hacker imagery — Pets.com was NOT a crime story
  #     and that visual could trigger YPP monetization review)
  #   - era anachronisms (1940s noir detective in a 1999 dot-com bust)
  #   - misrepresented-topic visuals
  #   - generic panels with zero recognisable company iconography
  #
  # High-severity flags gate the stage (needs_human); operator
  # reviews 03_assets/visual_brand_safety_flags.json then either
  # --rerender the specific beats or --approve to ship as-is.
  enabled: true
  gate_on_severity: high          # "high" | "low" | "off"
  sample_every_n: 2               # check every Nth beat to bound
                                  # VLM cost (60-95 beat episodes
                                  # × 1 VLM call each adds up). With
                                  # 2, we sample ~half the beats —
                                  # enough to catch systemic issues
                                  # (a recurring noir character, an
                                  # era-mismatched style) without
                                  # 95 sequential VLM round-trips.

brand_safety:
  # Defamation-risk review pass added Batch B 2026-05-26. Runs as
  # the tail of S07 critique. The brand_safety_review.txt prompt
  # produces 02_script/brand_safety_flags.json with structured
  # flags. Each flag has severity ∈ {high, low}; high-severity
  # flags trigger a `needs_human` gate so the operator can review
  # before S08 runs.
  enabled: true
  gate_on_severity: high     # "high" | "low" | "off". When "high",
                              # any high-severity flag marks S07 as
                              # needs_human. When "low", any flag at
                              # all blocks. When "off", flags are
                              # logged-only.
  # An operator who has reviewed and intentionally approved a
  # high-severity flag can clear the gate the same way the S08 gate
  # is cleared:
  #   python -m pipeline.hermes_orchestrator --approve <ep_id>

youtube_analytics:
  # Performance feedback loop (Batch E 2026-05-27). Out-of-band S14
  # stage pulls per-episode metrics from the YouTube Data + Analytics
  # APIs and writes them back so future S1/S6/S8 prompts learn from
  # what worked. Manual trigger only (Q-E1 confirmed):
  #   python -m pipeline.hermes_orchestrator --analyse-performance
  #
  # Setup (one-time):
  #   1. Enable YouTube Data API v3 + YouTube Analytics API in
  #      a Google Cloud project. Create OAuth 2.0 Client ID for
  #      Desktop app.
  #   2. Put credentials in .env:
  #        YOUTUBE_OAUTH_CLIENT_ID=...
  #        YOUTUBE_OAUTH_CLIENT_SECRET=...
  #   3. Run `python -m pipeline.hermes_orchestrator --authorize-youtube`.
  #   4. Install optional deps: `pip install -e '.[youtube]'`
  enabled: false                  # flip to true once OAuth is set up
                                  # AND at least 3-5 episodes have been
                                  # published with --set-video-id
  channel_id: ""                  # leave blank; "channel==MINE" works
  summary_window: 20              # last N episodes considered when
                                  # building the prompt-injection
                                  # summary (Q-E2: pattern + up to 3
                                  # concrete example episode IDs)

topic_validation:
  # S01 pre-commit demand check. Before persisting a topic the
  # writer LLM picked, we probe SearXNG to confirm the topic has
  # actual audience demand and isn't already saturated.
  #
  # Two signals, both via the same SearXNG instance S02 uses:
  #
  #   - `<company> documentary` under categories=videos
  #     → saturation window: min..max distinct video URLs.
  #       Below min = obscure (no demand). Above max = saturated
  #       (we can't break into the niche).
  #
  #   - `<company>` under categories=news
  #     → recent-news count. Advisory only; logged but never
  #       rejects. High counts mean "trending right now" — a
  #       company that filed for bankruptcy last week is a
  #       goldmine and the rolling-window news count tells you so.
  #
  # The non-US ratio enforces geographic diversity. With
  # non_us_ratio=0.33 and non_us_ratio_lookback=6, the last six
  # picks must contain at least round(6*0.33) = 2 non-US topics;
  # if they don't, the next pick is force-routed to non-US via a
  # hard hint in the prompt and a post-validation country check.
  enabled: true
  min_youtube_results: 3            # below = topic too obscure
  max_youtube_results: 100          # above = topic too saturated
  prefer_decline_stories: true      # bias prompt toward failure arcs
  non_us_ratio: 0.33                # 1-in-3 episodes non-US
  non_us_ratio_lookback: 6          # measured over the last N picks
  trending_news_lookback_days: 30   # advisory; logged in signals dict

  # Incumbent-trap filter (Batch F 2026-05-27). When true, S01
  # hard-rejects topics whose company_name / founder / one_line_pitch
  # matches the over-covered-on-YouTube list in pipeline/trends.py.
  # Theranos, Enron, WeWork, FTX, Pets.com etc. have hundreds of
  # competing docs with millions of views combined — adding doc #51
  # fights for impressions against incumbents the algo already
  # trusts. Off-channel niches grow 5-10x faster.
  reject_incumbent_traps: true

upload:
  mode: "manual"                    # "manual" only — no automatic upload in this pipeline
  schedule_offset_hours: 36

search:
  backend: "searxng"
  searxng_url: "http://10.0.4.252:8080"
  engines: ""                       # comma-separated; blank = SearXNG default set
  safesearch: 0
  results_per_query: 30
  user_agent: "BusinessStoriesPipeline/0.1 (+research)"
  request_timeout_seconds: 30

tts:
  # TTS backend dispatcher (Batch D 2026-05-27). The orchestrator
  # picks one of: kokoro (default, free, local) or elevenlabs
  # (paid, perceived-quality step change). The factory in tts.py
  # falls back to Kokoro on any ElevenLabs init failure (missing
  # API key, etc.) so flipping `backend: elevenlabs` is safe to try.
  backend: kokoro                  # kokoro | elevenlabs

  elevenlabs:
    # When backend==elevenlabs, this block is active. Keep
    # enabled: false until you've put ELEVENLABS_API_KEY in .env
    # and confirmed the voice quality on a preview-mode episode.
    enabled: false
    model_id: eleven_multilingual_v2   # eleven_multilingual_v2
                                       # | eleven_turbo_v2_5
                                       # | eleven_monolingual_v1
    voice_id: "pNInz6obpgDQGcFmaJgB"   # "Adam" preset; fine default
    # Per-narrator voice override map. Keys are narrator IDs from
    # narrators.yaml; values are ElevenLabs voice_ids. Pin per
    # narrator if you want N1/N2/N3/N4 to be different voices.
    voice_id_map: {}                   # {N1: "voice_id_1", ...}

asr:
  # ASR backend for Shorts subtitles (Batch D 2026-05-27).
  # whisper.cpp is the recommended choice — free, local, accurate
  # at base.en model size. If the binary isn't on PATH, Shorts get
  # generated without subtitles (the cut still happens).
  backend: whisper_cpp
  binary: whisper-cli                   # binary name on PATH
  model: base.en                        # base.en | small.en | medium.en
  model_path: ""                        # absolute path override for
                                        # the .bin model file; empty =
                                        # let whisper.cpp resolve

packaging:
  # S13 packaging settings (Batch D 2026-05-27).
  titles_count: 10                      # title variants per episode
  thumbnails_enabled: true
  shorts_enabled: true
  shorts_count: 3                       # vertical clips per episode
  shorts_target_seconds: 30.0
  shorts_burn_subtitles: true           # Q-D1: hard-burn subtitles,
                                        # knob-able (set false to keep
                                        # raw vertical cuts).
  show_channel_logo: true               # Q-D2: composite channel logo
                                        # in thumbnail corner. Logo
                                        # asset at
                                        # assets/branding/channel_mark.png
                                        # Knob-able (false = no logo).

music_library:
  # S11 audio post uses a curated local library — no MusicGen,
  # no Stable Audio Open, no synthesized music or SFX.
  #
  # Layout:
  #   ${root}/assets/music_library/
  #     ├── manifest.json           # per-track metadata
  #     └── *.wav / *.mp3 / *.flac
  #
  # Each manifest entry shape (license fields added 2026-05-26 Batch A):
  #   {"file": "ambient_rise_01.wav",
  #    "mood": ["hopeful","rising","determined"],
  #    "tempo": "slow|mid|fast",
  #    "instruments": ["piano","strings","synth_pad"],
  #    "tags": ["origin","founder","underdog"],
  #    "duration_seconds": 312,
  #    "suits_narrators": ["N1","N3"],   # optional pin
  #    "license": "CC0 | CC-BY | YouTube-Audio-Library | Pixabay | Epidemic-Sound | royalty-free | unknown",
  #    "attribution": "Composer Name — Track Title",  # required for CC-BY
  #    "source_url": "https://..."                    # where the file came from
  #   }
  # The license metadata is emitted by S12 into the per-episode
  # 06_metadata/license_attributions.txt for paste into the YouTube
  # description box. Missing license = unknown = warning logged but
  # the track is still pickable.
  enabled: true
  path: "${root}/assets/music_library"
  manifest: "${root}/assets/music_library/manifest.json"
  crossfade_seconds: 4
  music_gain_db: -31.0              # bed level under voice
  music_start_offset_seconds: 30.0  # Anchored to the new 6-act template:
                                    # Act 0 (the hook) runs 0:00-0:30 dry,
                                    # then the music bed swells in with
                                    # Act 1 ("set the era..."). Pushing
                                    # this earlier puts music UNDER the
                                    # hook delivery — bad for retention.
  # Voice level normalization (ported from maritime, voice-only).
  # Batch F 2026-05-27: voice_dynaudnorm_max_gain dropped from 15→9.
  # The aggressive 15 dB ceiling was flattening voice dynamics across
  # beats — every sentence sounded equally important, killing emotional
  # contour. 9 preserves natural speech dynamics while still smoothing
  # Kokoro's level inconsistencies.
  voice_dynaudnorm_enabled: true
  voice_dynaudnorm_framelen_ms: 200
  voice_dynaudnorm_gauss: 11
  voice_dynaudnorm_max_gain: 9.0

grok:
  # xAI Grok image-correction pass (S09 sub-phase). When a FLUX render
  # comes back with malformed / illegible text artifacts flagged by
  # the VLM, S09 sends the image + the original FLUX prompt to Grok
  # via xAI's API. Grok regenerates the image with the text corrected
  # and the rest of the composition preserved as faithfully as
  # possible. Both the original FLUX render and the Grok-corrected
  # version are archived to 03_assets/grok/ for comparison; the
  # corrected version replaces the FLUX image at 03_assets/flux/
  # under the same filename, so downstream stages (S12) pick it up
  # transparently.
  #
  # Authentication: the xAI API key is read from environment
  # variables in this order:
  #   1. XAI_API_KEY  (canonical, matches xAI's own docs)
  #   2. GROK_API_KEY (alias for ergonomics)
  # Both can be set in a project-root .env file (gitignored). See
  # .env.example for the template. NEVER paste the key into this
  # config.yaml — GitHub's secret-scanning will reject the push,
  # and config.yaml is committed to the repo. The api_key field
  # below remains only as a last-resort back-compat fallback;
  # KEEP IT EMPTY.
  enabled: true
  api_key: ""
  model: "grok-imagine-image-quality"   # quality variant — higher fidelity
                                        # than grok-imagine-image, worth the
                                        # extra latency for correction beats.
  base_url: "https://api.x.ai/v1"
  endpoint_path: "/images/generations"  # text-to-image; we no longer ask
                                        # Grok to edit the FLUX image, we
                                        # ask it to regenerate from the
                                        # same prompt.
  timeout_seconds: 180
  resolution: "2k"                      # Grok defaults to 1K — explicitly
                                        # request 2K. Combined with 16:9
                                        # aspect_ratio this produces 2048x1152
                                        # which downsamples cleanly to the
                                        # 1920x1080 the rest of the pipeline
                                        # expects.
  aspect_ratio: "16:9"
  # Operator-editable prompt template lives at
  # pipeline/prompts/grok_text_correction.txt. The {flux_prompt}
  # placeholder is replaced with the exact prompt FLUX rendered from.

flux_cli:
  # The flux CLI is invoked exactly as:
  #   flux "<prompt>" --height 1080 --width 1920 --steps 24 \
  #                   --seed <N> --output <abs_path.png>
  binary: "flux"
  width: 1920
  height: 1080
  steps: 24
  timeout_seconds: 600
  # If true, the adapter folds negative-prompt text into the positive
  # prompt as "... -- avoid: <neg>" since the CLI has no separate flag.
  fold_negative_into_prompt: true

asset_hunt:
  # Master switch for S05 (PD Asset Hunt). When false, S05 writes an
  # empty asset_manifest.json and returns immediately — no Wikimedia
  # calls, no SearXNG image search, no upscaling, no VLM captioning.
  # S08 then routes every beat to FLUX, which is the right call for
  # comic-book-styled episodes where PD photo assets don't fit the
  # visual style anyway. Set true to restore the full PD-hunt path.
  enabled: true 

  # Narrow PD path (Batch C 2026-05-26). When asset_hunt.enabled is
  # ALSO true, this list restricts PD routing to only the named
  # visual_intent values. The default is the two intents where real
  # photos genuinely add value without breaking the comic style
  # (founder Wikipedia portraits, period newspaper headlines). All
  # other visual_intents still route through FLUX.
  #
  # When asset_hunt.enabled is false (current default), this list
  # is ignored. The wiring is in place so flipping enabled: true +
  # leaving enabled_visual_intents at default activates the narrow
  # path without a code change.
  enabled_visual_intents:
    - founder_portrait
    - document_or_headline

sfx_library:
  # SFX bed under voice (Batch C 2026-05-26). S11 Phase 2 looks up
  # short SFX clips by cue (from S08's per-beat sfx_cue field) and
  # mixes them at beat-start, ducked under voice. Operator must
  # source license-clean clips and populate assets/sfx_library/.
  #
  # Layout:
  #   ${root}/assets/sfx_library/
  #     ├── manifest.json
  #     └── *.wav / *.mp3
  #
  # Each manifest entry shape:
  #   {"file": "typewriter_01.wav",
  #    "cue": "typewriter",
  #    "intensity": "sharp",
  #    "license": "CC0 | CC-BY | freesound | Pixabay | unknown",
  #    "attribution": "Author Name — Sound Title",
  #    "source_url": "https://...",
  #    "duration_seconds": 0.9}
  #
  # Run `python -m pipeline.tools.scan_sfx_library` after dropping
  # audio files in to backfill duration_seconds via ffprobe.
  #
  # Starts disabled — flip to true after the operator has dropped
  # ≥1 file per cue into assets/sfx_library/. With enabled=false
  # S11 Phase 2 is a no-op and the audio mix is identical to pre-
  # Batch-C.
  enabled: false
  path: "${root}/assets/sfx_library"
  manifest: "${root}/assets/sfx_library/manifest.json"
  default_gain_db: -18.0          # SFX level vs. voice (-18 dB
                                  # = clearly audible but distinctly
                                  # below voice; the operator can
                                  # override per-track via the
                                  # manifest's gain_db_hint field)
  crossfade_ms: 50                # short fade-in/out at SFX edges
                                  # so the bed doesn't click

callouts:
  # On-screen text callouts (Batch C 2026-05-26). The writer LLM
  # emits inline [CALLOUT: "$9 BILLION"] markers after high-impact
  # concrete-number sentences. S08 parses these into a per-beat
  # `callouts` list. S12 composites the bracketed text as a
  # high-contrast text overlay (yellow body + black stroke, same
  # styling as the title card).
  enabled: true
  max_per_beat: 1                 # Q-C2 confirmed: cap at 1,
                                  # configurable. Raise carefully —
                                  # spamming dilutes the effect.
  font_size_pct: 0.10             # frac of frame height (1080 *
                                  # 0.10 = 108 px)
  color: "#FFE600"                # bright yellow
  stroke_color: "#000000"
  stroke_width: 6
  hold_seconds: 2.5
  fade_ms: 200

generic_stash:
  enabled: true
  threshold: 0.18
  max_reuses_per_asset: 5

stock_sources:
  # S5 Phase 1b — institutional / community PD archives. API keys
  # come from environment variables (never this file).
  enabled: true
  results_per_query: 25
  smithsonian:
    enabled: true                   # CC0 — strong on industrial history
  europeana:
    enabled: true                   # CC0/CC-BY/PD — strong on European corporate history
  pixabay:
    enabled: true                   # Pixabay License — atmospheric / office stock

pd_upscale:
  # On-demand image upscaler — Real-ESRGAN x4 + GFPGAN face restore.
  # S5 spawns this as a subprocess at the end of its asset hunt.
  enabled: false
  python: "~/.maritime-services/upscale-venv/bin/python"
  script: "~/.maritime-services/upscale_cli.py"
  target_min_dimension: 800
  min_input_dimension: 200
  restore_faces: true
  timeout_seconds: 1200
  postprocess:
    enabled: true
    clahe_cliplimit: 1.5
    usm_radius: 1.2
    usm_percent: 50
    grain_sigma: 2.5

image_qa:
  # VLM judge for S9 FLUX renders. Comic-book artifacts list includes
  # wrong-era logos, garbled signage text, distorted faces.
  enabled: true
  max_attempts_per_beat: 1
  timeout_seconds: 30
  caption_pd_assets: true
  strict_borderline: true

  # PD-vs-FLUX routing thresholds (cosine similarity over sentence-T
  # embeddings of beat description vs PD caption).
  #
  # CHANNEL STYLE IS COMIC BOOK PANELS — most beats SHOULD be FLUX
  # renders so the visual style is consistent across the episode.
  # PD assets should only display DIRECTLY when the semantic match
  # is strong enough to justify the style mismatch (e.g. a real
  # founder photo for a founder-portrait beat).
  #
  # pd_direct_use_threshold:
  #   0.20 — almost everything routes to PD (documentary style,
  #          like the maritime pipeline). Set this if your channel
  #          tolerates photo realism mixed with comic.
  #   0.55 — strict, comic-first (DEFAULT here). Real photos only
  #          when the match is genuinely strong.
  #   0.70 — extremely strict: PD displays only when the caption
  #          essentially names the same subject as the beat.
  pd_direct_use_threshold: 0.55
  # pd_reference_threshold: any PD asset whose match exceeds this
  # contributes its caption as text grounding into the FLUX prompt
  # (always text-only — img2img is not supported by the CLI).
  pd_reference_threshold: 0.20
  pd_max_reuses_per_asset: 30
  pd_reference_strength: 0.1
  # FLUX CLI has no img2img, so PD references are always text-only
  # (the PD caption is folded into the FLUX prompt as grounding).
  pd_image_reference_enabled: false

  flux_force_no_text: true

